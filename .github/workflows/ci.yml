name: CI Pipeline

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# Cancel in-progress runs on new push
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    # Skip if commit message contains [skip ci] or triggered by dependabot
    if: |
      !contains(github.event.head_commit.message, '[skip ci]') &&
      github.actor != 'dependabot[bot]'

    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest]
        node_version: [18, 20]
        include:
          - node_version: 22
            os: ubuntu-latest
            experimental: true

    # Mark experimental jobs as continue-on-error
    continue-on-error: ${{ matrix.experimental == true }}

    runs-on: ${{ matrix.os }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js ${{ matrix.node_version }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node_version }}

      # Cache dependencies
      - name: Cache npm
        uses: actions/cache@v3
        with:
          path: ~/.npm
          key: ${{ runner.os }}-node-${{ hashFiles('**/package-lock.json') }}
          restore-keys: |
            ${{ runner.os }}-node-

      - name: Install dependencies
        run: npm ci

      - name: Run tests
        run: npm test

      # Upload logs only if something failed
      - name: Upload logs if failed
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: logs-node-${{ matrix.node_version }}
          path: logs/